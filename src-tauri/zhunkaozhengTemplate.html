<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>准考证-{{EXAM_TITLE}}</title>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #f2f2f2;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      color: #1f1f1f;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 12mm;
      background: #fff;
      page-break-after: always;
      break-after: page;
    }

    .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .ticket-sheet {
      min-height: 273mm;
      border: 1.2px solid #304765;
      padding: 10mm 10mm 9mm;
      display: flex;
      flex-direction: column;
      gap: 6mm;
    }

    .ticket-header {
      text-align: center;
      padding-bottom: 4mm;
      border-bottom: 1px solid #9eb0c6;
    }

    .ticket-title {
      margin: 0;
      font-size: 21pt;
      font-weight: 700;
      letter-spacing: 0.4px;
      line-height: 1.35;
    }

    .ticket-subtitle {
      margin-top: 2mm;
      font-size: 15pt;
      color: #526579;
      letter-spacing: 2px;
    }

    .basic-info {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 16mm;
      padding: 1mm 0 2mm;
      flex-wrap: wrap;
    }

    .basic-info-label {
      color: #5f6f82;
      font-size: 10pt;
      letter-spacing: 0.4px;
    }

    .basic-info-value {
      display: inline-block;
      margin-left: 4px;
      padding: 0 2mm 1.2mm;
      min-width: 22mm;
      border-bottom: 1px solid #74879c;
      font-size: 13pt;
      font-weight: 700;
      color: #17263b;
      word-break: break-all;
      text-align: center;
    }

    .section-title {
      margin: 0 0 3mm;
      text-align: center;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 5px;
      text-indent: 5px;
      color: #1e3554;
    }

    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 10.5pt;
    }

    .schedule-table col.subject-col {
      width: 18%;
    }

    .schedule-table col.time-date-col {
      width: 17%;
    }

    .schedule-table col.time-range-col {
      width: 30%;
    }

    .schedule-table col.room-col {
      width: 18%;
    }

    .schedule-table col.seat-col {
      width: 17%;
    }

    .schedule-table th,
    .schedule-table td {
      border: 1px solid #596a7e;
      text-align: center;
      padding: 7px 6px;
      line-height: 1.34;
      vertical-align: middle;
      word-break: break-word;
    }

    .schedule-table thead th {
      background: #e9f0f7;
      color: #324b66;
      font-size: 10.5pt;
      font-weight: 700;
    }

    .schedule-table tbody td:nth-child(2),
    .schedule-table tbody td:nth-child(3) {
      line-height: 1.42;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .notice-section {
      margin-top: 2mm;
      padding: 3mm 1mm 0;
    }

    .notice-list {
      margin: 0;
      padding-left: 22px;
      font-size: 10pt;
      line-height: 1.85;
      color: #2c3440;
    }

    .notice-list li {
      margin-bottom: 2px;
      text-align: justify;
    }

    @media print {
      html,
      body {
        background: #fff;
      }

      .page {
        margin: 0;
        padding: 0;
      }

      .ticket-sheet {
        min-height: 297mm;
        border: none;
        padding: 12mm;
      }
    }
  </style>
</head>
<body>
<!--TICKET_PAGE_START-->
  <div class="page">
    <div class="ticket-sheet">
      <div class="ticket-header">
        <h1 class="ticket-title">{{EXAM_TITLE}}</h1>
        <div class="ticket-subtitle">准 考 证</div>
      </div>

      <div class="basic-info">
        <div class="basic-info-item">
          <span class="basic-info-label">姓名：</span>
          <span class="basic-info-value">{{STUDENT_NAME}}</span>
        </div>
        <div class="basic-info-item">
          <span class="basic-info-label">班级：</span>
          <span class="basic-info-value">{{CLASS_NAME}}</span>
        </div>
        <div class="basic-info-item">
          <span class="basic-info-label">考号：</span>
          <span class="basic-info-value">{{ADMISSION_NO}}</span>
        </div>
      </div>

      <div class="schedule-section">
        <div class="section-title">考 试 安 排</div>
        <table class="schedule-table">
          <colgroup>
            <col class="subject-col" />
            <col class="time-date-col" />
            <col class="time-range-col" />
            <col class="room-col" />
            <col class="seat-col" />
          </colgroup>
          <thead>
            <tr>
              <th>考试科目</th>
              <th colspan="2">考试时间</th>
              <th>考场</th>
              <th>座号</th>
            </tr>
          </thead>
          <tbody>
            {{EXAM_ROWS}}
          </tbody>
        </table>
      </div>

      <div class="notice-section">
        <div class="section-title">考 生 须 知</div>
        <ol class="notice-list">
          {{NOTICE_ITEMS}}
        </ol>
      </div>
    </div>
  </div>
<!--TICKET_PAGE_END-->
</body>
</html>
